<div class="news-container">
  <ul class="news-list">
    <!--(bake-start _foreach="y:news_years")-->
    <li class="news-year-group">
      <details class="news-year-details">
        <summary class="news-year-heading">{{ y.year }} News</summary>
        <ul class="news-year-items">
        <!--(bake-start _foreach="n:y.items")-->
        <li class="news-item">
          <div class="news-content">
            <span class="news-kind-text news-kind-text-{{ n.kind }}">{{ n.kind }} news</span>
            <span class="news-date">({{ n.month }} {{ y.year }})</span>
            {{ n.content }}
          </div>
        </li>
        <!--(bake-end)-->
        </ul>
      </details>
    </li>
    <!--(bake-end)-->
  </ul>
</div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const firstNewsGroup = document.querySelector('.news-year-details');
    if (firstNewsGroup) {
      firstNewsGroup.open = true;
    }
  });
</script>
