                <span class="theme-toggle-icon theme-toggle-icon-sun" aria-hidden="true">☀</span>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        try {
            const navbar = document.getElementById('navbar-menu');
            for (const tag of navbar.getElementsByTagName('a')) {
                // highlight the nav button for current page
                if (tag.innerText.toLowerCase().includes(PAGE_NAME)) {
                    tag.classList.add('is-active');
                }
            }
        } catch (e) { }

        try {
            const root = document.documentElement;
            const toggle = document.getElementById('theme-toggle');
            const updateToggle = () => {
                const dark = root.dataset.theme === 'dark';
                toggle.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
                toggle.setAttribute('title', dark ? 'Switch to light mode' : 'Switch to dark mode');
                toggle.dataset.theme = dark ? 'dark' : 'light';
            };

            toggle.addEventListener('click', () => {
                const nextTheme = root.dataset.theme === 'dark' ? 'light' : 'dark';
                root.dataset.theme = nextTheme;
                root.style.colorScheme = nextTheme;
                localStorage.setItem('theme', nextTheme);
                updateToggle();
            });

            updateToggle();
        } catch (e) { }
    });
</script>
